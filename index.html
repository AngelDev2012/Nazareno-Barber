<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nazareno Barber</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:30px 20px;
    background:linear-gradient(90deg,#000,#1a1a1a);
    border-bottom:1px solid #333;
}

header h1{
    font-size:2.5rem;
}

header p{
    color:#aaa;
}

/* UBICACION */
.location{
    position:absolute;
    top:20px;
    left:20px;
    font-size:0.9rem;
    color:#ccc;
}

/* SECTION */
.section{
    padding:40px 20px;
    max-width:1200px;
    margin:auto;
}

.section h2{
    text-align:center;
    margin-bottom:30px;
    font-size:2rem;
}

/* GALERIA */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:12px;
    transition:0.3s;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.gallery img:hover{
    transform:scale(1.05);
}

/* PRECIOS */
.pricing{
    text-align:center;
    margin-top:40px;
    font-size:1.5rem;
}

.pricing span{
    color:#25D366;
    font-weight:bold;
}

/* BOTONES */
.floating{
    position:fixed;
    right:20px;
    bottom:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.btn{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:24px;
    text-decoration:none;
}

.whatsapp{
    background:#25D366;
}

.instagram{
    background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    color:#777;
    border-top:1px solid #222;
    margin-top:40px;
}

.dev{
    margin-top:5px;
    font-size:0.9rem;
    color:#555;
}
</style>
</head>

<body>

<div class="location">
📍 Punta Lara, Ensenada
</div>

<header>
    <h1>💈 Nazareno Barber 💈</h1>
    <p>Cortes modernos • Estilo profesional</p>
</header>

<section class="section">
    <h2>¡Mis Cortes!</h2>

    <div class="gallery">
        <img src="corte1.jpg">
        <img src="corte2.jpg">
        <img src="corte3.jpg">
        <img src="corte4.jpg">
    </div>

    <div class="pricing">
        Precio del Corte: <span>$2500</span>
    </div>
</section>

<div class="floating">
    <a href="https://wa.me/542216697908" target="_blank" class="btn whatsapp">💬</a>
    <a href="https://instagram.com/27naza.zelaya" target="_blank" class="btn instagram">📷</a>
</div>

<footer>
    © 2026 Nazareno Barber
    <div class="dev">Desarrollado por AngelDev</div>
</footer>

</body>
</html>
